<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: black;
        }

        #greeting h1 {
            font-size: 2rem;
            color: white;
            font-weight: 600;
            position: relative;
        }

        #greeting h1 span {
            color: rgb(140, 255, 0);
            position: relative;
        }

        #greeting h1 span::after {
            content: "";
            position: absolute;
            right: -8px;
            top: 50%;
            height: 30px;
            width: 2px;
            background: blue;
            transform: translateY(-45%);
            animation: blink 0.7s infinite;
        }

        #greeting h1 span.stop-blinking::after {
            animation: none;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1 id="greeting"><span id="dynamic"></span></h1>

    <script>
        const getGreeting = () => {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "Good morning";
            if (hour >= 12 && hour < 18) return "Good afternoon";
            if (hour >= 18 && hour < 22) return "Good evening";
            return "Good night";
        }

        const h1 = document.getElementById("greeting");
        const dynamicText = document.getElementById("dynamic");

        // Litt usikker om den skal være med men jeg må sjekke med admin panel
        h1.insertBefore(document.createTextNode(getGreeting()), dynamicText);

        const words = [" hi", " do you have anything in your calendar today?"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        const typeEffect = () => {
            const currentWord = words[wordIndex];
            const currentChar = currentWord.substring(0, charIndex);
            dynamicText.textContent = currentChar;
            dynamicText.classList.remove("stop-blinking");

            if (!isDeleting && charIndex < currentWord.length) {
                charIndex++;
                setTimeout(typeEffect, 200);
            } else if (isDeleting && charIndex > 0) {
                charIndex--;
                setTimeout(typeEffect, 100);
            } else {
                isDeleting = !isDeleting;
                dynamicText.classList.add("stop-blinking");
                wordIndex = !isDeleting ? (wordIndex + 1) % words.length : wordIndex;
                setTimeout(typeEffect, 1200);
            }
        }

        typeEffect();
    </script>
</body>
</html>
